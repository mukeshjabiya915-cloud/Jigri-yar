<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइव चैट और गेमिंग जोन</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; }
        
        /* चैट सेक्शन */
        #chat-window { height: 300px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #fafafa; }
        .message { margin-bottom: 8px; padding: 8px 12px; border-radius: 18px; max-width: 80%; font-size: 14px; }
        .others { background: #e4e6eb; align-self: flex-start; }
        .mine { background: #0084ff; color: white; margin-left: auto; text-align: right; }

        /* गेम सेक्शन */
        .game-section { border-top: 2px solid #eee; padding-top: 20px; text-align: center; }
        #score-board { font-size: 18px; font-weight: bold; color: #d9534f; margin-bottom: 10px; }
        .btn-game { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-game:active { transform: scale(0.95); }

        .input-area { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .btn-send { background: #0084ff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #333;">Live Chat & Win 🏆</h2>
    
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="अपना संदेश लिखें...">
        <button class="btn-send" onclick="sendMsg()">भेजें</button>
    </div>

    <hr>

    <div class="game-section">
        <div id="score-board">विजेता बनने के लिए क्लिक करें!</div>
        <button class="btn-game" onclick="playGame()">Click to Win!</button>
        <p id="winner-tag" style="color: blue; font-weight: bold; margin-top: 10px;"></p>
    </div>
</div>

<script>
    // नोट: असली ऐप के लिए यहाँ आपके सर्वर का URL आएगा
    const socket = io("https://your-socket-server.herokuapp.com"); 

    let myScore = 0;
    const chatWindow = document.getElementById('chat-window');
    const winnerTag = document.getElementById('winner-tag');

    // 1. चैट फंक्शन
    function sendMsg() {
        const input = document.getElementById('msgInput');
        if(input.value !== "") {
            socket.emit('chat_message', input.value);
            addMessage(input.value, 'mine');
            input.value = "";
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = 'message ' + type;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // 2. गेम लॉजिक (जो सबसे ज्यादा क्लिक करेगा वो जीतेगा)
    function playGame() {
        myScore++;
        document.getElementById('score-board').innerText = "आपका स्कोर: " + myScore;
        socket.emit('update_score', myScore);
    }

    // सॉकेट इवेंट्स
    socket.on('receive_message', (data) => {
        addMessage(data, 'others');
    });

    socket.on('new_winner', (winnerName) => {
        winnerTag.innerText = "🏆 अभी " + winnerName + " सबसे आगे है!";
    });
</script>

</body>
</html>
