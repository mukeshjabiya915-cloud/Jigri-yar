<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gola Yaari Pro - Live Video Chat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; }
        
        /* टॉप बार */
        header { background: linear-gradient(to right, #ff4757, #ed1c24); padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .coin-box { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 14px; color: gold; }

        /* वीडियो एरिया */
        #video-grid { height: 70vh; display: flex; flex-direction: column; background: #1a1a1a; position: relative; }
        .remote-video { width: 100%; height: 100%; object-fit: cover; background: #222; }
        .local-video { width: 100px; height: 140px; position: absolute; bottom: 10px; right: 10px; border: 2px solid white; border-radius: 10px; z-index: 5; background: #333; }

        /* कंट्रोल बटन्स */
        #controls { height: 15vh; display: flex; justify-content: space-around; align-items: center; background: #111; padding: 10px; }
        .btn { border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .match-btn { background: #2ed573; box-shadow: 0 0 15px #2ed573; }
        .next-btn { background: #ffa502; }
        .stop-btn { background: #ff4757; }

        /* सेटअप स्क्रीन */
        #setup-screen { position: fixed; inset: 0; background: #121212; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .input-group { margin: 15px; }
        input, select { padding: 12px; width: 260px; border-radius: 8px; border: none; margin-top: 5px; background: #222; color: white; }

        /* चैट नोटिफिकेशन */
        #status { position: absolute; top: 70px; left: 0; right: 0; text-align: center; font-size: 14px; color: #aaa; z-index: 10; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 style="color:#ff4757; margin-bottom: 20px;">Gola Yaari 🎥</h1>
    <div class="input-group">
        <p>आपका नाम:</p>
        <input type="text" id="username" placeholder="उदा: रवि या कमल">
    </div>
    <div class="input-group">
        <p>आप कौन हैं:</p>
        <select id="gender">
            <option value="Boy">लड़का (Male)</option>
            <option value="Girl">लड़की (Female)</option>
        </select>
    </div>
    <button class="btn match-btn" onclick="joinYaari()">लाइव चैट शुरू करें</button>
</div>

<header>
    <span>Gola Yaari Live</span>
    <div class="coin-box">💰 Coins: <span id="coins">100</span></div>
</header>

<div id="status">पार्टनर का इंतज़ार करें...</div>

<div id="video-grid">
    <video class="remote-video" id="remoteVid" autoplay playsinline></video>
    <video class="local-video" id="localVid" autoplay playsinline muted></video>
</div>

<div id="controls">
    <button class="btn stop-btn" onclick="window.location.reload()">End</button>
    <button class="btn next-btn" onclick="findNext()">Next Match</button>
</div>

<script>
    const socket = io();
    let localStream;
    let myCoins = 100;

    async function joinYaari() {
        const name = document.getElementById('username').value;
        const gender = document.getElementById('gender').value;
        
        if(!name) return alert("कृपया नाम लिखें!");

        // कैमरा शुरू करना
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVid').srcObject = localStream;
            document.getElementById('setup-screen').style.display = 'none';

            // सर्वर को बताना कि मैं जुड़ गया हूँ
            socket.emit('join_matchmaking', { name, gender });
        } catch (err) {
            alert("कैमरा चालू नहीं हो सका!");
        }
    }

    function findNext() {
        if(myCoins < 10) return alert("सिक्के खत्म हो गए! रिचार्ज करें।");
        
        myCoins -= 10; // हर मैच पर 10 सिक्के काटें
        document.getElementById('coins').innerText = myCoins;
        
        document.getElementById('status').innerText = "अगला पार्टनर खोज रहे हैं...";
        socket.emit('find_next');
    }

    // सर्वर से इवेंट्स प्राप्त करना
    socket.on('matched', (partner) => {
        document.getElementById('status').innerText = "आप " + partner.name + " (" + partner.gender + ") से जुड़ गए हैं!";
        // यहाँ असल वीडियो स्ट्रीम के लिए WebRTC सिग्नलिंग का उपयोग होता है
    });

    socket.on('waiting', (msg) => {
        document.getElementById('status').innerText = msg;
    });
</script>

</body>
</html>
