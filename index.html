<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravi Real-Time Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; }
        #header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 20px; position: fixed; width: 100%; top: 0; z-index: 1000; }
        #chat-box { margin: 70px 10px 70px 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 75%; word-wrap: break-word; font-size: 16px; }
        .received { background: white; align-self: flex-start; border: 1px solid #ddd; }
        .sent { background: #dcf8c6; align-self: flex-end; border: 1px solid #ccedaa; }
        #input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; box-sizing: border-box; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        button { background: #128c7e; color: white; border: none; padding: 10px 20px; margin-left: 5px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">Ravi's Live Group</div>
<div id="chat-box"></div>

<div id="input-area">
    <input type="text" id="msgInput" placeholder="मैसेज टाइप करें...">
    <button onclick="sendMessage()">भेजें</button>
</div>

<script>
    // --- यहाँ आपको अपना Firebase Config डालना होगा ---
    // अगर आपके पास नहीं है, तो Firebase Console पर जाकर Web App बनाएँ।
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase Initialize
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // अपना नाम सेट करें
    let myName = prompt("अपना नाम लिखें ताकि लोग आपको पहचान सकें:");
    if(!myName) myName = "अनजान";

    // मैसेज भेजना
    function sendMessage() {
        const text = document.getElementById("msgInput").value;
        if (text.trim() !== "") {
            db.ref("chat_messages").push().set({
                sender: myName,
                text: text,
                timestamp: Date.now()
            });
            document.getElementById("msgInput").value = "";
        }
    }

    // मैसेज रिसीव करना (Real-time)
    db.ref("chat_messages").on("child_added", (snapshot) => {
        const data = snapshot.val();
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        
        // चेक करना कि मैसेज किसने भेजा
        msgDiv.classList.add("msg");
        msgDiv.classList.add(data.sender === myName ? "sent" : "received");
        
        msgDiv.innerHTML = `<strong>${data.sender}</strong><br>${data.text}`;
        chatBox.appendChild(msgDiv);
        window.scrollTo(0, document.body.scrollHeight);
    });

    // Enter दबाने पर मैसेज जाए
    document.getElementById("msgInput").onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };
</script>

</body>
</html>
